<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie-Recommendation</title>
    <style>
        :root{
            --bg1: #0b1020;
            --bg2: #111a33;
            --card: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.10);
            --text: rgba(255, 255, 255, 0.92);
            --muted: rgba(255, 255, 255, 0.70);
            --muted2: rgba(255, 255, 255, 0.55);
            --focus: rgba(103, 232, 249, 0.55);
        }

        *{ box-sizing: border-box; }

        body{
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
            background:
                radial-gradient(1100px 700px at 20% 10%, rgba(103, 232, 249, 0.14), transparent 55%),
                radial-gradient(900px 600px at 85% 20%, rgba(167, 139, 250, 0.12), transparent 60%),
                linear-gradient(180deg, var(--bg1), var(--bg2));
        }

        .page{
            max-width: 1100px;
            margin: 0 auto;
            padding: 44px 18px 56px;
        }

        .hero{
            display: grid;
            gap: 10px;
            margin-bottom: 20px;
        }

        .hero h1{
            margin: 0;
            font-size: clamp(24px, 2.4vw, 34px);
            letter-spacing: 0.2px;
        }

        .hero p{
            margin: 0;
            color: var(--muted);
            line-height: 1.5;
            max-width: 62ch;
        }

        .search{
            margin: 18px 0 26px;
            display: flex;
            justify-content: center;
        }

        .search__group{
            width: min(740px, 100%);
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            padding: 12px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .search input{
            width: 100%;
            padding: 14px 14px;
            font-size: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            background: rgba(15, 23, 42, 0.45);
            color: var(--text);
            outline: none;
        }

        .search input::placeholder{ color: var(--muted2); }

        .search input:focus{
            border-color: rgba(103, 232, 249, 0.40);
            box-shadow: 0 0 0 4px var(--focus);
        }

        .search button{
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: linear-gradient(135deg, rgba(103, 232, 249, 0.22), rgba(167, 139, 250, 0.18));
            color: var(--text);
            font-weight: 600;
            letter-spacing: 0.2px;
            cursor: pointer;
            transition: transform 120ms ease, filter 120ms ease, border-color 120ms ease;
            white-space: nowrap;
        }

        .search button:hover{ transform: translateY(-1px); filter: brightness(1.05); }
        .search button:active{ transform: translateY(0px); filter: brightness(0.98); }

        .results{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            align-items: stretch;
        }

        .item{
            text-align: left;
            padding: 14px;
            border-radius: 16px;
            background: var(--card);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            overflow: hidden;
            display: grid;
            gap: 10px;
            min-height: 280px;
        }

        .item img{
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            background: rgba(255, 255, 255, 0.04);
        }

        .item h3{
            margin: 0;
            font-size: 16px;
            line-height: 1.25;
        }

        .item p{
            margin: 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
        }

        .item p:nth-of-type(2){
            color: var(--muted2);
            display: -webkit-box;
            -webkit-line-clamp: 5;
            line-clamp: 5;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .results:empty{
            padding: 24px;
            border-radius: 16px;
            border: 1px dashed rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.03);
        }

        .results:empty::before{
            content: "Search for a movie to get recommendations.";
            display: block;
            text-align: center;
            color: var(--muted);
        }

        .status{
            width: min(740px, 100%);
            margin: 0 auto 16px;
            min-height: 22px;
            text-align: center;
            color: var(--muted);
            font-size: 13px;
            letter-spacing: 0.2px;
        }

        .status[aria-hidden="true"]{ display: none; }

        .status__dots::after{
            content: "...";
            display: inline-block;
            width: 0;
            text-align: left;
            overflow: hidden;
            vertical-align: bottom;
            animation: dots 1.2s steps(4, end) infinite;
        }

        @keyframes dots{
            to{ width: 1.6em; }
        }

        .search__group.is-loading{
            border-color: rgba(103, 232, 249, 0.24);
        }

        .search button:disabled{
            cursor: not-allowed;
            filter: grayscale(0.2) brightness(0.95);
            opacity: 0.8;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="hero">
            <h1>Movie Recommendations</h1>
            <p>Type a movie name to get similar picks with posters, ratings, and quick overviews.</p>
        </div>

        <div class="search">
            <div class="search__group">
                <input id="MovieName" type="text" placeholder="e.g., Interstellar" autocomplete="off" aria-label="Movie name" />
                <button type="button" onclick="getRecommendations()">Search</button>
            </div>
        </div>

        <div class="status" id="status" aria-live="polite" aria-hidden="true"></div>

        <div class="results" id="results"></div>
    </div>
    <script>
        async function getRecommendations(){

            let movie = document.getElementById("MovieName").value;
            const response = await fetch(`https://movie-prediction-yyqm.onrender.com/recommend?movie=${encodeURIComponent(movie)}`);
            const data = await response.json();
            document.getElementById("results").innerHTML = "";

            if (data.error) {
                document.getElementById("results").innerHTML = `<p>${data.error}</p>`;
                return;
            }

            data.forEach(movie => {
                let card = `
                <div class="item">
                    <img src="${movie.poster} width="100" height="300">
                    <h3>${movie.title}</h3>
                    <p>Rating - ${movie.rating}/10</p>
                    <p>${movie.overview}</p>
                </div>
                `;
                document.getElementById("results").innerHTML += card;
            });
        }
    </script>

    <script>
        // Adds loading UI without modifying the main script block.
        (function () {
            const original = window.getRecommendations;
            if (typeof original !== "function") return;

            const statusEl = document.getElementById("status");
            const searchGroup = document.querySelector(".search__group");
            const buttonEl = document.querySelector(".search button");

            function setLoading(isLoading) {
                if (statusEl) {
                    statusEl.setAttribute("aria-hidden", String(!isLoading));
                    statusEl.innerHTML = isLoading
                        ? '<span class="status__dots">Loading</span>'
                        : "";
                }

                if (searchGroup) {
                    searchGroup.classList.toggle("is-loading", isLoading);
                }

                if (buttonEl) {
                    buttonEl.disabled = isLoading;
                }
            }

            window.getRecommendations = async function () {
                setLoading(true);
                try {
                    await original();
                } catch (err) {
                    if (statusEl) {
                        statusEl.setAttribute("aria-hidden", "false");
                        statusEl.textContent = "Something went wrong. Please try again.";
                    }
                    throw err;
                } finally {
                    setLoading(false);
                }
            };
        })();
    </script>
</body>
</html>
